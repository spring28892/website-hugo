baseURL = 'https://stevenh.pro/'
languageCode = 'en-us'
title = "Steven's Logfile"
theme = "PaperMod"
enableEmoji = true
enableRobotsTXT = true
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
disqusShortname = "spring28892"
hasCJKLanguage = true

[params]
author = "Steven Huang"
description = """
a.k.a spring28892
程式設計、法律、土木工程…諸多領域均略有涉略
以身為工具型選手為豪
並期望自己能在通才之路上更上一層樓
"""
copyright = "Steven Huang 2022 - {{ YEAR }}"
keywords = ""
mainSections = ["post"]
images = ['apple-touch-icon.png']
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true

  homeInfoAvatar = "images/profile/profile.jpg"

  [params.homeInfoParams]
